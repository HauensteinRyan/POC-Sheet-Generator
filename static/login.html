<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC Sheet Generator — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #161616;
      --border:  #2a2a2a;
      --gold:    #d4a017;
      --text:    #e8e8e8;
      --muted:   #666;
      --error:   #e05c5c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 36px 32px 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-mark {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--gold);
    }
    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--gold); }

    .field { margin-bottom: 18px; }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.12s;
    }
    .btn:hover { background: #e0ac1a; }

    .error-msg {
      display: none;
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.3);
      color: var(--error);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 12px;
      margin-bottom: 18px;
      text-align: center;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">POC</div>
      <div class="logo-sub">Sheet Generator</div>
    </div>

    <div id="error-msg" class="error-msg">Invalid username or password.</div>

    <form method="POST" action="/auth/login">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').classList.add('visible');
    }
  </script>
</body>
</html>
