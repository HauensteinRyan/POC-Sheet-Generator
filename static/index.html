<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC Sheet Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #171717;
      --surface:       #232323;
      --panel-soft:    #1b1b1b;
      --field:         #101010;
      --border:        #3d3d3d;
      --border-strong: #575757;
      --gold:          #d2ae4b;
      --text:          #f2f2f2;
      --muted:         #a8a8a8;
      --success:       #0d7f59;
      --warn:          #e0a030;
      --error:         #d20a0a;
      --blue:          #3d7cff;
      --row-even:      #202020;
      --row-odd:       #181818;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 13px;
    }

    button, input, select { font: inherit; cursor: pointer; }

    /* ── Layout ───────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-logos { display: flex; align-items: center; gap: 14px; }
    .header-logos img { height: 22px; width: auto; }
    .header-divider { width: 2px; height: 16px; background: #9CA3AF; flex-shrink: 0; }
    .header-version { font-size: 10px; font-weight: 500; color: #4B5563; letter-spacing: 0.05em;
      align-self: flex-end; transform: translate(-7px, -1px); }
    .header-title-divider { width: 1px; height: 22px; background: var(--border); margin: 0 8px; }
    .header-title { font-size: 22px; font-weight: 700; color: #ffffff; }

    .columns {
      display: grid;
      grid-template-columns: 1fr 200px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panels ───────────────────────────────────────────────── */
    .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      background: #333333;
      font-size: 11px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.07em; color: #c9c9c9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 32px;
    }
    .panel-header .ph-count { font-weight: 700; color: var(--muted); }

    .panel-body { flex: 1; overflow: auto; }

    /* ── Drop zone ─────────────────────────────────────────────── */
    .drop-zone {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; height: 100%; padding: 32px;
      text-align: center; cursor: pointer; position: relative;
      transition: background 0.12s;
    }
    .drop-zone:hover, .drop-zone.drag-over { background: rgba(210,174,75,.06); }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon  { font-size: 36px; opacity: 0.4; }
    .drop-zone .dz-label { font-size: 13px; font-weight: 800; color: var(--text); }
    .drop-zone .dz-hint  { font-size: 11px; color: var(--muted); }

    /* ── Doc section cards ─────────────────────────────────────── */
    .section-card {
      padding: 9px 12px;
      border-top: 5px solid #252525;
      display: grid; grid-template-columns: 46px 1fr; gap: 0 8px;
    }
    .section-card:nth-child(even) { background: var(--row-even); }
    .section-card:nth-child(odd)  { background: var(--row-odd); }
    .sc-num  { font-size: 11px; font-weight: 900; color: var(--gold); padding-top: 1px; text-transform: uppercase; }
    .sc-name { font-weight: 800; font-size: 12px; margin-bottom: 3px; text-transform: uppercase; }
    .sc-cue  { color: var(--muted); font-size: 11px; line-height: 1.4; }
    .sc-cue.no-copy { font-style: italic; }

    /* ── Middle column ─────────────────────────────────────────── */
    .mid-col {
      display: flex; flex-direction: column; align-items: stretch;
      justify-content: center; gap: 10px; padding: 16px 12px;
      border-right: 1px solid var(--border);
    }

    /* file badge */
    .file-badge { display: none; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
    .file-badge .fb-icon { font-size: 22px; }
    .file-badge .fb-name { font-size: 10px; color: var(--muted); word-break: break-all; line-height: 1.3; }
    .file-badge .fb-clear { font-size: 10px; color: var(--error); cursor: pointer; text-decoration: underline; margin-top: 2px; font-weight: 700; }

    /* segmented PPV / FN control */
    .show-toggle { display: none; width: 100%; }
    .show-toggle-label {
      font-size: 10px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); text-align: center; margin-bottom: 6px;
    }
    .segmented {
      display: grid; grid-auto-flow: column; align-items: center;
      gap: 4px; padding: 4px;
      border: 1px solid #4a4a4a; border-radius: 7px; background: #1e1e1e;
      width: 100%;
    }
    .segmented button {
      min-height: 30px; border: 1px solid #4c4c4c; border-radius: 5px;
      background: transparent; color: #d4d4d4; font-weight: 800; font-size: 13px;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .segmented button.active {
      background: #f2f2f2; border-color: #f2f2f2; color: #111111;
    }
    .segmented button:hover:not(.active) { background: #2b2b2b; }

    /* action buttons */
    .btn-sync {
      display: none; width: 100%; min-height: 34px; padding: 0 14px;
      align-items: center; justify-content: center;
      border: 1px solid #f2f2f2; border-radius: 6px;
      background: #f2f2f2; color: #111111;
      font-size: 13px; font-weight: 800;
      transition: background 0.12s, opacity 0.12s;
    }
    .btn-sync:hover    { background: #d8d8d8; border-color: #d8d8d8; }
    .btn-sync:disabled { opacity: 0.35; cursor: default; }

    .btn-preview, .btn-download {
      display: none; width: 100%; min-height: 34px; padding: 0 14px;
      align-items: center; justify-content: center; gap: 8px;
      border: 1px solid #505050; border-radius: 6px;
      background: #2b2b2b; color: #f2f2f2;
      font-size: 13px; font-weight: 800;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn-preview:hover, .btn-download:hover { background: #383838; border-color: var(--border-strong); }
    .btn-preview:disabled, .btn-download:disabled { opacity: 0.35; cursor: default; }

    /* status */
    #status-msg {
      font-size: 11px; font-weight: 700; text-align: center;
      color: var(--muted); min-height: 14px; width: 100%;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    #status-msg.loading { color: var(--gold); }
    #status-msg.success { color: #2ecc71; }
    #status-msg.error   { color: var(--error); }

    /* config warnings */
    .config-warn {
      display: none; width: 100%;
      background: rgba(224,160,48,.08);
      border: 1px solid rgba(224,160,48,.3); border-radius: 6px;
      padding: 7px 10px; font-size: 10px; font-weight: 700;
      color: var(--warn); line-height: 1.5; text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Right panel placeholder ───────────────────────────────── */
    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; height: 100%;
      color: var(--muted); padding: 40px; text-align: center;
    }
    .placeholder .ph-icon { font-size: 32px; opacity: 0.2; }

    /* ── Excel preview table ───────────────────────────────────── */
    table.xl-table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
    table.xl-table th {
      position: sticky; top: 0; z-index: 1;
      background: #333333;
      border-bottom: 1px solid #444444;
      border-right: 1px solid #444444;
      padding: 6px 10px;
      text-align: left; font-size: 10px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.07em; color: #c9c9c9;
    }
    table.xl-table td {
      padding: 7px 10px; border-bottom: 1px solid var(--border);
      border-right: 1px solid #2a2a2a;
      vertical-align: top; line-height: 1.5; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
    }
    table.xl-table tr { border-top: 5px solid #252525; }
    table.xl-table tr:nth-child(even) td { background: var(--row-even); }
    table.xl-table tr:nth-child(odd)  td { background: var(--row-odd); }
    table.xl-table td:first-child {
      color: var(--muted); font-size: 10px; font-weight: 900;
      text-align: right; padding-right: 6px; width: 34px;
      border-right: 2px solid #363636;
    }
    table.xl-table td.col-name {
      white-space: normal; word-break: break-word; overflow: visible; width: 175px;
    }
    table.xl-table td.col-cue {
      white-space: normal; word-break: break-word; overflow: visible;
    }
    .col-len  { width: 62px; white-space: nowrap; }
    .len-count   { display: block; font-weight: 900; color: var(--text); font-size: 12px; }
    .len-formula { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.03em; }

    /* editable cells */
    td[contenteditable="true"] { outline: none; cursor: text; }
    td[contenteditable="true"]:focus {
      background: #0d1f38 !important;
      box-shadow: inset 0 0 0 2px rgba(61,124,255,0.6);
    }
    td[contenteditable="true"]:hover:not(:focus) { background: #262626 !important; }

    /* ── Sync results ──────────────────────────────────────────── */
    .sync-results { padding: 14px; }
    .sync-summary { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .sync-pill {
      display: inline-flex; align-items: center; gap: 5px;
      min-height: 26px; padding: 0 10px;
      border-radius: 5px; font-size: 11px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.06em;
      border: 1px solid;
    }
    .sync-pill.added   { background: rgba(13,127,89,.15);  border-color: rgba(13,127,89,.4);  color: #2ecc71; }
    .sync-pill.updated { background: rgba(210,174,75,.12); border-color: rgba(210,174,75,.4); color: var(--gold); }
    .sync-pill.removed { background: rgba(210,10,10,.12);  border-color: rgba(210,10,10,.4);  color: #e05c5c; }

    .sync-group { margin-bottom: 12px; }
    .sync-group-label {
      font-size: 10px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 5px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .sync-group-label.added   { color: #2ecc71; }
    .sync-group-label.updated { color: var(--gold); }
    .sync-group-label.removed { color: #e05c5c; }
    .sync-item {
      padding: 3px 0; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .sync-item::before { font-size: 10px; flex-shrink: 0; font-weight: 900; }
    .sync-group.added   .sync-item::before { content: '＋'; color: #2ecc71; }
    .sync-group.updated .sync-item::before { content: '↺'; color: var(--gold); }
    .sync-group.removed .sync-item::before { content: '✕'; color: #e05c5c; }

    /* right panel tabs */
    .panel-tabs { display: flex; gap: 0; }
    .panel-tab {
      padding: 6px 12px; font-size: 11px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.12s, border-color 0.12s;
    }
    .panel-tab.active { color: var(--text); border-bottom-color: var(--gold); }

    /* scrollbar */
    .panel-body::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 820px) {
      .columns { grid-template-columns: 1fr; }
      .mid-col { flex-direction: row; flex-wrap: wrap; justify-content: center; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
      .panel { height: 40vh; }
      table.xl-table { font-size: 12px; }
      td[contenteditable="true"] { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-logos">
      <img src="/static/logos/3027.png" alt="3027" />
      <div class="header-divider"></div>
      <img src="/static/logos/prusik.png" alt="Prusik" />
      <span class="header-version">v1.3</span>
      <div class="header-title-divider"></div>
      <span class="header-title">POC Sheet Generator</span>
    </div>
  </header>

  <div class="columns">

    <!-- LEFT: Doc preview -->
    <div class="panel">
      <div class="panel-header">
        <span style="display:flex;align-items:center;gap:7px;">
          <svg width="16" height="16" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 4H10C7.8 4 6 5.8 6 8v32c0 2.2 1.8 4 4 4h28c2.2 0 4-1.8 4-4V20L28 4z" fill="#4285F4"/>
            <path d="M28 4l14 16H28V4z" fill="#1565C0"/>
            <rect x="14" y="26" width="20" height="3" rx="1.5" fill="white"/>
            <rect x="14" y="32" width="20" height="3" rx="1.5" fill="white"/>
            <rect x="14" y="20" width="20" height="3" rx="1.5" fill="white"/>
          </svg>
          Word Doc
        </span>
        <span class="ph-count" id="left-count"></span>
      </div>
      <div class="panel-body" id="left-body">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept=".docx" />
          <div class="dz-icon">📄</div>
          <div class="dz-label">Drop your .docx here</div>
          <div class="dz-hint">or click to browse</div>
        </div>
      </div>
    </div>

    <!-- MIDDLE: Controls -->
    <div class="mid-col">

      <div class="file-badge" id="file-badge">
        <div class="fb-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.44 11.05L12.25 20.24C11.12 21.37 9.59 22 7.99 22C6.39 22 4.86 21.37 3.73 20.24C2.6 19.11 1.97 17.58 1.97 15.98C1.97 14.38 2.6 12.85 3.73 11.72L12.92 2.53C13.68 1.77 14.71 1.34 15.79 1.34C16.87 1.34 17.9 1.77 18.66 2.53C19.42 3.29 19.85 4.32 19.85 5.4C19.85 6.48 19.42 7.51 18.66 8.27L9.46 17.46C9.08 17.84 8.57 18.06 8.03 18.06C7.49 18.06 6.98 17.84 6.6 17.46C6.22 17.08 6 16.57 6 16.03C6 15.49 6.22 14.98 6.6 14.6L15.07 6.14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="fb-name" id="fb-name"></div>
        <div class="fb-clear" id="fb-clear">Remove file</div>
      </div>

      <!-- PPV / FN segmented control -->
      <div class="show-toggle" id="show-toggle">
        <div class="show-toggle-label">Show Type</div>
        <div class="segmented">
          <button class="active" data-type="PPV">PPV</button>
          <button data-type="FN">FN</button>
        </div>
      </div>

      <button class="btn-sync" id="btn-sync">Sync to Sheets</button>
      <button class="btn-preview" id="btn-preview">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="white" stroke-width="2"/>
        </svg>
        Preview .xlsx
      </button>
      <button class="btn-download" id="btn-download">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3V16M12 16L7 11M12 16L17 11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="4" y1="20" x2="20" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Download .xlsx
      </button>

      <div id="status-msg">Select a .docx to begin</div>

      <div class="config-warn" id="config-warn"></div>
    </div>

    <!-- RIGHT: Excel preview / sync results -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-tabs" id="right-tabs" style="display:none">
          <div class="panel-tab active" data-tab="preview">Preview</div>
          <div class="panel-tab" data-tab="results">Sync Results</div>
        </div>
        <span id="right-header-label" style="display:flex;align-items:center;gap:7px;">
          <svg width="16" height="16" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 4H10C7.8 4 6 5.8 6 8v32c0 2.2 1.8 4 4 4h28c2.2 0 4-1.8 4-4V20L28 4z" fill="#34A853"/>
            <path d="M28 4l14 16H28V4z" fill="#1E7E34"/>
            <rect x="13" y="22" width="22" height="3" rx="0.5" fill="white"/>
            <rect x="13" y="28" width="22" height="3" rx="0.5" fill="white"/>
            <rect x="13" y="34" width="22" height="3" rx="0.5" fill="white"/>
            <line x1="24" y1="22" x2="24" y2="37" stroke="#34A853" stroke-width="1.5"/>
          </svg>
          Excel Preview
        </span>
      </div>
      <div class="panel-body" id="right-body">
        <div class="placeholder">
          <div class="ph-icon">📊</div>
          <div>Excel preview appears here after uploading a doc</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────
  let selectedFile = null;
  let parsedRows   = null;
  let xlsxBlob     = null;
  let xlsxFilename = 'output.xlsx';
  let showType     = 'PPV';
  let syncResultData = null;

  // ── Element refs ───────────────────────────────────────────────
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileBadge   = document.getElementById('file-badge');
  const fbName      = document.getElementById('fb-name');
  const fbClear     = document.getElementById('fb-clear');
  const showToggle  = document.getElementById('show-toggle');
  const btnSync     = document.getElementById('btn-sync');
  const btnPreview  = document.getElementById('btn-preview');
  const btnDownload = document.getElementById('btn-download');
  const statusMsg   = document.getElementById('status-msg');
  const leftBody    = document.getElementById('left-body');
  const leftCount   = document.getElementById('left-count');
  const rightBody   = document.getElementById('right-body');
  const rightTabs   = document.getElementById('right-tabs');
  const rightLabel  = document.getElementById('right-header-label');
  const configWarn  = document.getElementById('config-warn');

  // ── Config status (check on load) ─────────────────────────────
  fetch('/config-status').then(r => r.json()).then(({ warnings }) => {
    if (warnings.length) {
      configWarn.style.display = 'block';
      configWarn.textContent = '⚠ ' + warnings.join(' · ');
    }
  }).catch(() => {});

  // ── Status helper ──────────────────────────────────────────────
  function setStatus(msg, cls = '') {
    statusMsg.textContent = msg;
    statusMsg.className = cls;
  }

  // ── Show-type toggle ───────────────────────────────────────────
  document.querySelectorAll('.segmented button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.segmented button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showType = btn.dataset.type;
    });
  });

  // ── File selection ─────────────────────────────────────────────
  function selectFile(file) {
    if (!file.name.toLowerCase().endsWith('.docx')) {
      setStatus('Only .docx files are supported.', 'error');
      return;
    }
    selectedFile = file;
    parsedRows   = null;
    xlsxBlob     = null;
    syncResultData = null;

    fbName.textContent    = file.name;
    fileBadge.style.display   = 'flex';
    showToggle.style.display  = 'block';
    btnSync.style.display     = 'flex';
    btnPreview.style.display  = 'flex';
    btnDownload.style.display = 'flex';

    // Reset right panel
    showRightPlaceholder();
    rightTabs.style.display = 'none';
    rightLabel.style.display = 'inline';

    setStatus('Parsing document…', 'loading');
    loadDocPreview(file);
  }

  function clearFile() {
    selectedFile = parsedRows = xlsxBlob = syncResultData = null;
    fileInput.value = '';
    fileBadge.style.display   = 'none';
    showToggle.style.display  = 'none';
    btnSync.style.display     = 'none';
    btnPreview.style.display  = 'none';
    btnDownload.style.display = 'none';
    leftCount.textContent = '';
    setStatus('Select a .docx to begin', '');
    restoreDropZone();
    showRightPlaceholder();
    rightTabs.style.display = 'none';
    rightLabel.style.display = 'inline';
  }

  fbClear.addEventListener('click', clearFile);

  // ── Doc preview ────────────────────────────────────────────────
  async function loadDocPreview(file) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/parse', { method: 'POST', body: fd });
      if (!res.ok) throw new Error((await res.json().catch(() => ({detail:res.statusText}))).detail);
      const data = await res.json();
      parsedRows = data.rows;
      renderDocCards(parsedRows);
      renderExcelTable(parsedRows);
      leftCount.textContent = `${data.count} sections`;
      setStatus(`${data.count} sections found`, '');
    } catch (e) {
      setStatus(`Parse error: ${e.message}`, 'error');
    }
  }

  function renderDocCards(rows) {
    leftBody.innerHTML = '';
    const spacer = document.createElement('div');
    spacer.id = 'doc-header-spacer';
    spacer.style.flexShrink = '0';
    leftBody.appendChild(spacer);
    const frag = document.createDocumentFragment();
    rows.forEach(r => {
      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `
        <div class="sc-num">${esc(r.number)}</div>
        <div>
          <div class="sc-name">${esc(r.name)}</div>
          ${r.cue
            ? `<div class="sc-cue">${esc(r.cue)}</div>`
            : `<div class="sc-cue no-copy">No spoken copy</div>`}
        </div>`;
      frag.appendChild(card);
    });
    leftBody.appendChild(frag);
  }

  // ── Right panel views ──────────────────────────────────────────
  function showRightPlaceholder() {
    rightBody.innerHTML = `
      <div class="placeholder">
        <div class="ph-icon">📊</div>
        <div>Excel preview appears here after uploading a doc</div>
      </div>`;
  }

  function renderExcelTable(rows) {
    const wrap = document.createElement('div');
    wrap.style.overflowX = 'auto';
    const table = document.createElement('table');
    table.className = 'xl-table';
    table.innerHTML = `
      <colgroup>
        <col style="width:34px">
        <col style="width:52px">
        <col style="width:140px">
        <col style="width:52px">
        <col style="width:140px">
        <col style="width:320px">
        <col style="width:80px">
        <col style="width:62px">
      </colgroup>
      <thead><tr>
        <th style="color:var(--border)"></th>
        <th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th>
      </tr>
      <tr>
        <th style="color:var(--border)"></th>
        <th>Promo #</th><th>Name</th><th>Promo #</th>
        <th>Promo Name</th><th>Cue</th><th>Notes</th><th>Len</th>
      </tr></thead>`;
    const tbody = document.createElement('tbody');
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      const rowNum = i + 2;
      const cueLen = (r.cue || '').length;
      tr.innerHTML = `
        <td>${rowNum}</td>
        <td contenteditable="true" spellcheck="false" style="color:var(--gold);font-weight:900">${esc(r.number)}</td>
        <td contenteditable="true" spellcheck="true" class="col-name" style="font-weight:800">${esc(r.name)}</td>
        <td contenteditable="true" spellcheck="false" style="color:var(--muted)">${esc(r.number)}</td>
        <td contenteditable="true" spellcheck="true" class="col-name" style="color:var(--muted)">${esc(r.name)}</td>
        <td contenteditable="true" spellcheck="true" class="col-cue">${r.cue ? esc(r.cue) : ''}</td>
        <td contenteditable="true" spellcheck="true" style="color:var(--muted)"></td>
        <td class="col-len">
          <span class="len-count">${cueLen}</span>
          <span class="len-formula">=LEN(E${rowNum})</span>
        </td>`;

      const cueCell = tr.querySelector('.col-cue');
      const lenCount = tr.querySelector('.len-count');
      cueCell.addEventListener('input', () => {
        lenCount.textContent = cueCell.textContent.length;
      });

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  function renderSyncResults(data) {
    const div = document.createElement('div');
    div.className = 'sync-results';

    const summary = document.createElement('div');
    summary.className = 'sync-summary';
    summary.innerHTML = `
      <div class="sync-pill added">＋ ${data.added.length} Added</div>
      <div class="sync-pill updated">↺ ${data.updated.length} Updated</div>
      <div class="sync-pill removed">✕ ${data.removed.length} Removed</div>`;
    div.appendChild(summary);

    const groups = [
      { key: 'added',   label: 'Added',   cls: 'added'   },
      { key: 'updated', label: 'Updated', cls: 'updated' },
      { key: 'removed', label: 'Removed', cls: 'removed' },
    ];
    groups.forEach(({ key, label, cls }) => {
      if (!data[key].length) return;
      const g = document.createElement('div');
      g.className = `sync-group ${cls}`;
      g.innerHTML = `<div class="sync-group-label ${cls}">${label} (${data[key].length})</div>`;
      data[key].forEach(name => {
        const item = document.createElement('div');
        item.className = 'sync-item';
        item.textContent = name;
        g.appendChild(item);
      });
      div.appendChild(g);
    });

    return div;
  }

  function setupRightTabs(previewEl, resultsEl) {
    rightLabel.style.display = 'none';
    rightTabs.style.display  = 'flex';

    const tabs = rightTabs.querySelectorAll('.panel-tab');
    const views = { preview: previewEl, results: resultsEl };

    rightBody.innerHTML = '';
    rightBody.appendChild(previewEl);

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        rightBody.innerHTML = '';
        rightBody.appendChild(views[tab.dataset.tab]);
        if (tab.dataset.tab === 'preview') syncRowHeights();
      });
    });

    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    rightBody.innerHTML = '';
    rightBody.appendChild(resultsEl);
  }

  // ── Sync to Sheets ─────────────────────────────────────────────
  btnSync.addEventListener('click', async () => {
    if (!selectedFile) return;
    btnSync.disabled = true;
    setStatus(`Syncing to ${showType}…`, 'loading');

    const rows = getActiveRows();
    const fd = new FormData();
    fd.append('rows', JSON.stringify(rows));
    fd.append('show_type', showType);

    try {
      const res = await fetch('/sync', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      syncResultData = await res.json();

      const a = syncResultData.added.length;
      const u = syncResultData.updated.length;
      const r = syncResultData.removed.length;
      setStatus(`+${a} added · ${u} updated · ${r} removed`, 'success');

      const previewEl = parsedRows ? renderExcelTable(parsedRows) : document.createElement('div');
      const resultsEl = renderSyncResults(syncResultData);
      setupRightTabs(previewEl, resultsEl);
    } catch (e) {
      setStatus(`Sync error: ${e.message}`, 'error');
    } finally {
      btnSync.disabled = false;
    }
  });

  // ── Read edited table rows from DOM ───────────────────────────
  function getActiveRows() {
    const table = rightBody.querySelector('.xl-table');
    if (!table) return parsedRows;
    const result = [];
    table.querySelectorAll('tbody tr').forEach(tr => {
      const cells = tr.querySelectorAll('td');
      result.push({
        number: cells[1].textContent.trim(),
        name:   cells[2].textContent.trim(),
        cue:    cells[5].textContent.trim(),
      });
    });
    return result;
  }

  // ── Row height sync + scroll sync ─────────────────────────────
  let scrollSyncing = false;

  leftBody.addEventListener('scroll', () => {
    if (scrollSyncing) return;
    scrollSyncing = true;
    rightBody.scrollTop = leftBody.scrollTop;
    scrollSyncing = false;
  });
  rightBody.addEventListener('scroll', () => {
    if (scrollSyncing) return;
    scrollSyncing = true;
    leftBody.scrollTop = rightBody.scrollTop;
    scrollSyncing = false;
  });

  function syncRowHeights() {
    requestAnimationFrame(() => {
      const leftCards = Array.from(leftBody.querySelectorAll('.section-card'));
      const rightRows = Array.from(rightBody.querySelectorAll('.xl-table tbody tr'));
      const spacer    = document.getElementById('doc-header-spacer');
      if (!leftCards.length || !rightRows.length) return;

      leftCards.forEach(c => c.style.height = 'auto');
      rightRows.forEach(r => r.style.height = 'auto');
      if (spacer) spacer.style.height = 'auto';

      requestAnimationFrame(() => {
        const thead = rightBody.querySelector('.xl-table thead');
        if (spacer && thead) spacer.style.height = thead.offsetHeight + 'px';

        const len = Math.min(leftCards.length, rightRows.length);
        for (let i = 0; i < len; i++) {
          const maxH = Math.max(leftCards[i].offsetHeight, rightRows[i].offsetHeight);
          leftCards[i].style.height = maxH + 'px';
          rightRows[i].style.height = maxH + 'px';
        }
      });
    });
  }

  // ── Preview XLS ────────────────────────────────────────────────
  btnPreview.addEventListener('click', () => {
    if (!parsedRows) return;
    rightTabs.style.display  = 'none';
    rightLabel.style.display = 'inline';
    rightLabel.textContent   = 'Excel Preview';
    rightBody.innerHTML      = '';
    rightBody.appendChild(renderExcelTable(parsedRows));
    syncRowHeights();
  });

  // ── Download .xlsx ─────────────────────────────────────────────
  btnDownload.addEventListener('click', async () => {
    if (!parsedRows) return;
    btnDownload.disabled = true;
    btnDownload.textContent = 'Generating…';

    const rows = getActiveRows();
    const baseName = selectedFile ? selectedFile.name.replace(/\.docx$/i, '') : 'output';

    try {
      const res = await fetch('/download-rows', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows, filename: baseName }),
      });
      if (!res.ok) throw new Error((await res.json().catch(() => ({detail:res.statusText}))).detail);

      const blob = await res.blob();
      const disp = res.headers.get('Content-Disposition') || '';
      const m    = disp.match(/filename="?([^"]+)"?/);
      const filename = m ? m[1] : `${baseName}_output.xlsx`;

      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      setStatus(`Download error: ${e.message}`, 'error');
    } finally {
      btnDownload.disabled = false;
      btnDownload.textContent = '⬇ Download .xlsx';
    }
  });

  // ── Drop zone ──────────────────────────────────────────────────
  function restoreDropZone() {
    leftBody.innerHTML = '';
    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.innerHTML = `
      <input type="file" accept=".docx" />
      <div class="dz-icon">📄</div>
      <div class="dz-label">Drop your .docx here</div>
      <div class="dz-hint">or click to browse</div>`;
    wireDropZone(dz);
    leftBody.appendChild(dz);
  }

  function wireDropZone(dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
    });
    const inp = dz.querySelector('input[type=file]');
    inp.addEventListener('change', () => { if (inp.files[0]) selectFile(inp.files[0]); });
  }

  wireDropZone(dropZone);

  // ── Escape helper ──────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
