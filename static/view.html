<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC Sheet Generator — Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #161616;
      --border:  #2a2a2a;
      --gold:    #d4a017;
      --text:    #e8e8e8;
      --muted:   #666;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; display: flex; flex-direction: column; }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center;
      flex-shrink: 0; gap: 16px;
    }

    .header-logos { display: flex; align-items: center; gap: 14px; }
    .header-logos img { height: 22px; width: auto; }
    .header-divider { width: 2px; height: 16px; background: #9CA3AF; flex-shrink: 0; }
    .header-version { font-size: 10px; font-weight: 500; color: #4B5563; letter-spacing: 0.05em;
      align-self: flex-end; transform: translate(-7px, -3px); }
    .header-title-divider { width: 1px; height: 22px; background: var(--border); margin: 0 8px; }
    .header-title { font-size: 22px; font-weight: 700; color: #ffffff; }

    .sheet-frame { flex: 1; border: none; display: block; width: 100%; }
  </style>
</head>
<body>
  <header>
    <div class="header-logos">
      <img src="/static/logos/3027.png" alt="3027" />
      <div class="header-divider"></div>
      <img src="/static/logos/prusik.png" alt="Prusik" />
      <span class="header-version">v1.0</span>
      <div class="header-title-divider"></div>
      <span class="header-title">POC Sheet Generator</span>
    </div>
  </header>

  <iframe
    class="sheet-frame"
    src="https://cs2.fightmetric.com/users/sign_in?u=commentator&p=wecouldbeheroesjustforoneday"
    allowfullscreen
  ></iframe>
</body>
</html>
